<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VP-LV</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<script>
    const svg = d3.select("body")
        .append("svg")
        .attr("width", 500)
        .attr("height", 300);

    const colors = ["blue", "black", "red", "yellow", "green"];
    const positions = [
        [100,100], [200,100], [300,100],
        [150,150], [250,150]
    ];

    svg.selectAll("circle")
        .data(colors)
        .enter()
        .append("circle")
        .attr("cx", (d,i) => positions[i][0])
        .attr("cy", (d,i) => positions[i][1])
        .attr("r", 40)
        .attr("fill", "none")
        .attr("stroke", d => d)
        .attr("stroke-width", 5);
</script>

</body>
</html>
