<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VP-LV</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<script>
    const svg = d3.select("body")
        .append("svg")
        .attr("width", 200)
        .attr("height", 700);

    svg.append("rect")
        .attr("width", 100)
        .attr("height", 600)
        .attr("x", 50)
        .attr("y", 50)
        .attr("fill", "yellow")
        .attr("stroke", "black")
        .attr("stroke-width", 5)
        .attr("opacity", 0.5);
</script>

</body>
</html>
