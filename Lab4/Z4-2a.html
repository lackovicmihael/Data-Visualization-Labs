<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>

<script>
var width = 500;
var height = 600;
var outerRadius = 200;

var color = d3.scale.category20();


var data = [
    {name:'jabuka', value:17},
    {name:'kruska', value:4},
    {name:'banana', value:83},
    {name:'jagoda', value:47},
    {name:'ribizla', value:1}
];


/*
var data = [
    {name:'jabuka', value:17},
    {name:'kruska', value:4},
    {name:'banana', value:83},
    {name:'jagoda', value:47},
    {name:'ribizla', value:1}
];
*/

var pie = d3.layout.pie()
.value(function(d){ return d.value; });

var arc = d3.svg.arc()
.innerRadius(0)
.outerRadius(outerRadius);

var svg = d3.select("body")
.append("svg")
.attr("width", width)
.attr("height", height);

// LEGENDA
var legend = svg.append("g")
.attr("transform", "translate(20,20)");

legend.selectAll("g")
.data(data)
.enter()
.append("g")
.attr("transform", function(d,i){
    return "translate(0," + (i * 25) + ")";
})
.each(function(d,i){

    var g = d3.select(this);

    g.append("rect")
    .attr("width", 15)
    .attr("height", 15)
    .attr("fill", color(i));

    g.append("text")
    .attr("x", 20)
    .attr("y", 12)
    .text(d.name + " (" + d.value + ")");
});



// PIE CHART
var g = svg.append("g")
.attr("transform", "translate(" + width/2 + "," + (height - 250) + ")");

var arcs = g.selectAll("g")
.data(pie(data))
.enter()
.append("g");

arcs.append("path")
.attr("d", arc)
.attr("fill", function(d,i){ return color(i); });

</script>
</body>
</html>
